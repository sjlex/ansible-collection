---
- name: "Get __lazydocker_is_installed"
  block:
    - name: "Get current lazydocker version"
      ansible.builtin.command: "/usr/local/bin/lazydocker --version"
      register: __lazydocker_version_check
      changed_when: false
      failed_when: false

    - name: "Set facts for version comparison"
      ansible.builtin.set_fact:
        __lazydocker_is_installed: >-
          {{
            __lazydocker_version_check.rc == 0 and
            lazydocker_package_version in __lazydocker_version_check.stdout
          }}
