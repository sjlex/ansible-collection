---
- name: "Set up the repository"
  become: true
  become_user: root
  block:
    - name: "Ensure keyrings directory exists"
      ansible.builtin.file:
        path: "{{ docker_key_path | dirname }}"
        state: directory
        mode: '0755'

    - name: "Download Docker GPG key to a temporary file"
      ansible.builtin.get_url:
        url: "{{ docker_key_url }}"
        dest: "/tmp/docker.asc"
        mode: '0644'
      changed_when: false

    - name: "Verify GPG key fingerprint"
      ansible.builtin.command: "gpg --show-keys --with-fingerprint --with-colons /tmp/docker.asc"
      register: __docker_key_info
      changed_when: false
      failed_when: docker_key_id | lower not in __docker_key_info.stdout | lower

    - name: "Dearmor and install GPG key"
      ansible.builtin.shell: "cat /tmp/docker.asc | gpg --dearmor -o {{ docker_key_path }}"
      args:
        creates: "{{ docker_key_path }}"

    - name: "Remove temporary key file"
      ansible.builtin.file:
        path: "/tmp/docker.asc"
        state: absent
      changed_when: false

    - name: "Install dependencies for deb822_repository"
      ansible.builtin.apt:
        name: python3-debian
        state: present
        update_cache: true

    - name: "Add Docker repository (DEB822)"
      ansible.builtin.deb822_repository:
        name: docker
        types: [deb]
        uris: ["{{ docker_repo_url }}"]
        suites: ["{{ ansible_facts['distribution_release'] }}"]
        components: [stable]
        architectures: [amd64]
        signed_by: "{{ docker_key_path }}"
        state: present

- name: "Install docker"
  become: true
  become_user: root
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update_cache: true
  loop: "{{ __docker_packages }}"

- name: "Install dependencies"
  become: true
  become_user: root
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  loop: "{{ __docker_dependencies }}"
