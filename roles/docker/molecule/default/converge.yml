---
- name: "Converge"
  hosts: all
  remote_user: "ansible"

  tasks:
    - name: "Include docker"
      ansible.builtin.include_role:
        name: "docker"

    - name: "Ensure docker socket is accessible in tests"
      become: true
      become_user: root
      ansible.builtin.file:
        path: /var/run/docker.sock
        group: docker
        mode: '0666'
      changed_when: false

    - name: "Add User to group"
      become: true
      become_user: root
      ansible.builtin.user:
        name: "ansible"
        groups: "docker"
        append: true
