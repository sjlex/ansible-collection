---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  # Debian 13 - Trixie
  - name: role-ncdu_debian13_${MOLECULE_INSTANCE_ID}
    image: "python:3.13.12-trixie"
    pre_build_image: true

  # Debian 12 - Bookworm
  - name: role-ncdu_debian12_${MOLECULE_INSTANCE_ID}
    image: "python:3.13.12-bookworm"
    pre_build_image: true

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../../"

verifier:
  name: testinfra
