---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  # Debian 12 - Bookworm
  - name: role-ncdu_debian12_${MOLECULE_INSTANCE_ID}
    image: "python:3.13.0-bookworm"
    pre_build_image: true

  # Debian 11 - Bullseye
  - name: role-ncdu_debian11_${MOLECULE_INSTANCE_ID}
    image: "python:3.13.0-bullseye"
    pre_build_image: true

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../../"

verifier:
  name: testinfra
