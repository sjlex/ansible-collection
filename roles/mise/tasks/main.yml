---
- name: "Role: mise"
  tags:
    - mise
  when:
    - ansible_facts['distribution'] == 'Debian'
    - ansible_facts['distribution_major_version'] | int >= 12
  block:
    - name: "Gather facts"
      ansible.builtin.include_tasks:
        file: gather-facts.yml

    - name: "Install packages"
      ansible.builtin.include_tasks:
        file: install-packages.yml
