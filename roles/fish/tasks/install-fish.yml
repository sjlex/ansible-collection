---
- name: "Set up the repository"
  become: true
  become_user: root
  block:
    - name: "Ensure keyrings directory exists"
      ansible.builtin.file:
        path: "{{ fish_key_path | dirname }}"
        state: directory
        mode: "0755"

    - name: "Download fish GPG key to a temporary file"
      ansible.builtin.get_url:
        url: "{{ fish_key_url }}"
        dest: "/tmp/fish.asc"
        mode: '0644'
      changed_when: false

    - name: "Verify GPG key fingerprint"
      ansible.builtin.command: "gpg --show-keys --with-fingerprint --with-colons /tmp/fish.asc"
      register: __fish_key_info
      changed_when: false
      failed_when: fish_key_id | lower not in __fish_key_info.stdout | lower

    - name: "Dearmor and install GPG key"
      ansible.builtin.shell: "set -o pipefail && cat /tmp/fish.asc | gpg --dearmor -o {{ fish_key_path }}"
      args:
        executable: /bin/bash
        creates: "{{ fish_key_path }}"

    - name: "Remove temporary key file"
      ansible.builtin.file:
        path: "/tmp/fish.asc"
        state: absent
      changed_when: false

    - name: "Install dependencies for deb822_repository"
      ansible.builtin.apt:
        name: python3-debian
        state: present
        update_cache: true

    - name: "Add fish repository (DEB822)"
      ansible.builtin.deb822_repository:
        name: fish
        types: [deb]
        uris: ["{{ fish_repo_url }}"]
        suites: ["/"]
        signed_by: "{{ fish_key_path }}"
        state: present

- name: "Install fish"
  become: true
  become_user: root
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update_cache: true
  loop: "{{ __fish_packages }}"
  register: __fish_install_result

- name: "Check if fish is installed"
  ansible.builtin.command: "which fish"
  register: __fish_binary_check
  changed_when: false
  failed_when: false

- name: "Update fish facts after install"
  ansible.builtin.set_fact:
    __fish_is_installed: true
    __fish_binary_path: "{{ __fish_binary_check.stdout | trim if __fish_binary_check.rc == 0 else '' }}"
  when: __fish_install_result is succeeded
